version: "2"
services:
  mqtt:
    image: eclipse-mosquitto
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"

  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"

  nodered:
    image: nodered/node-red
    ports:
      - "1880:1880"
      - "1882:1882"
    volumes:
      - ./node-red-data:/data
      - /dev/snd:/dev/snd
    links:
      - mqtt
      - influxdb
  
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    links:
      - influxdb

  telegraf:
    image: telegraf:1.16
    links:
      - influxdb
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Panel de Contenedores Inteligentes</title>
</head>
<body>

<div class="container">
    <h2>Estado de Contenedores</h2>
    <div id="bloqueAgregarContenedor">
        <button class="btn" id="btnActivarMapa" onclick="activarModoInsercion()">+ Agregar Contenedor</button>
        <span id="textoInstruccion">
            📍 Hacé clic en el mapa para ubicar el contenedor... 
            <a id="cancelarAgregar" href="#" onclick="cancelarModoInsercion()">(Cancelar)</a>
        </span>
    </div>

    <div id="selector">
        <label id="label-piso">Viendo piso:</label>
        <select id="filtroPiso" class="selectorPiso" onchange="cargarContenedores()">
            <option value="Todos">Todos los pisos</option>
            <option value="Planta Baja">Planta Baja</option>
            <option value="Primer Piso">Primer Piso</option>
            <option value="Segundo Piso">Segundo Piso</option>
        </select>
    </div>
    
    <div id="mensaje-flotante"></div>

    <div id="mapa"></div>

    <table>
        <thead>
            <tr>
                <th>Contenedor</th>
                <th>Altura (cm)</th>
                <th>Llenado</th>
                <th>Piso</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla-contenedores">
            </tbody>
    </table>
</div>

<div id="modalContenedor" class="modal">
    <div class="modal-content">
        <div class="modal-header">Registrar Nuevo Contenedor</div>
        <form id="formNuevoContenedor" onsubmit="guardarContenedor(event)">
            <div class="form-group">
                <label>ID del Contenedor (Mismo que el topic MQTT)</label>
                <input type="text" id="contenedorId" placeholder="Ej: contenedor_plantabaja_1" required>
            </div>
            <div class="form-group">
                <label>Nombre / Ubicación</label>
                <input type="text" id="contenedorNombre" placeholder="Ej: Plaza Central - Norte" required>
            </div>
            <div class="form-group">
                <label>Altura Manual en cm</label>
                <input type="number" step="0.1" id="contenedorAltura" placeholder="Ej: 80">
            </div>
            <div class="form-group">
                <label>Piso</label>
                <select id="contenedorPiso" class="selectorPiso" required>
                    <option value="Planta Baja">Planta Baja</option>
                    <option value="Primer Piso">Primer Piso</option>
                    <option value="Segundo Piso">Segundo Piso</option>
                </select>
            </div>
            <div class="form-group">
                <label>Latitud (Autocompletado)</label>
                <input type="number" step="any" id="contenedorLat" readonly>
            </div>
            <div class="form-group">
                <label>Longitud (Autocompletado)</label>
                <input type="number" step="any" id="contenedorLng" readonly>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-cancel" onclick="cerrarModal()">Cancelar</button>
                <button type="submit" class="btn">Guardar</button>
            </div>
        </form>
    </div>
</div>
<div id="modalCalibrar" class="modal">
    <div class="modal-content modal-confirmar">
        <h3>Calibrar Sensor</h3>
        <p>
            Asegurate de que el contenedor <br>
            <b id="nombreContenedorCalibrar"></b><br>
            esté <strong>COMPLETAMENTE VACÍO</strong>.
        </p>
        <div style="display: flex; justify-content: center; gap: 15px;">
            <button class="btn btn-cancel" onclick="cerrarModalCalibrar()">Cancelar</button>
            <button class="btn" id="btnConfirmarCalibrar">Sí, comenzar</button>
        </div>
    </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
